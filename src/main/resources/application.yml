spring:
  application:
    name: paiagent-one
  datasource:
    url: jdbc:h2:file:./data/paiagent;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  # ========== Spring AI 配置 ==========
  ai:
    # OpenAI 兼容接口 (同时支持 OpenAI / DeepSeek 等)
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.7
    # 阿里云 DashScope 通义千问
    dashscope:
      api-key: ${TONGYI_API_KEY:sk-placeholder}
      chat:
        options:
          model: qwen-plus

server:
  port: 8080

logging:
  level:
    root: info
    com.paiagent: debug

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

auth:
  token-header: X-Auth-Token
  include-paths:
    - /api/workflow/**
    - /api/text-input/**
  exclude-paths:
    - /api/auth/**
    - /api/workflow/test
    - /h2-console/**

# 音频合成配置 (TTS 使用 DashScope SDK，与 Spring AI 独立)
audio:
  mock:
    enabled: false

minio:
  endpoint: http://127.0.0.1:9005
  accessKey: admin123
  secretKey: 12345678
  bucketName: paiagent
  publicUrl: http://127.0.0.1:9005
