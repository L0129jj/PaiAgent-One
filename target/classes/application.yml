spring:
  application:
    name: paiagent-one
  datasource:
    url: jdbc:h2:file:./data/paiagent;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    root: info
    com.paiagent: debug

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

auth:
  token-header: X-Auth-Token
  include-paths:
    - /api/workflow/**
    - /api/text-input/**
  exclude-paths:
    - /api/auth/**
    - /api/workflow/test
    - /h2-console/**

# 大模型API配置
model:
  mock:
    enabled: true
  default-vendor: openai
  openai:
    api-key: ${OPENAI_API_KEY:mock-openai-key}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:mock-deepseek-key}
  tongyi:
    api-key: ${TONGYI_API_KEY:mock-tongyi-key}

# 音频合成API配置
# TTS 使用阿里云 DashScope CosyVoice（与通义共享 API Key）
# 获取免费 API Key: https://dashscope.console.aliyun.com/
# 设置环境变量 TONGYI_API_KEY 后即可启用真人语音合成
# 未设置时自动回退为浏览器内置语音引擎
audio:
  mock:
    enabled: true